<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of squares</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .title {
            text-align: center;
            color: #1a3a5c;
            font-size: 32px;
            font-weight: bold;
            margin-top: 40px;
            letter-spacing: 1px;
        }

        .block {
            background-color: #f5f5f5;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            position: relative;
        }

        .block::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-color: #64d8d8;
            border-radius: 16px 16px 0 0;
        }

        .block-content {
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* 第一个区块 - 盾牌图标 */
        .shield-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #64d8d8 0%, #ffffff 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(26, 58, 92, 0.1);
        }

        .shield-inner {
            width: 50px;
            height: 60px;
            background-color: #1a3a5c;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shield-check {
            width: 24px;
            height: 24px;
            border-right: 4px solid #ffffff;
            border-bottom: 4px solid #ffffff;
            transform: rotate(45deg);
            margin-top: -8px;
        }

        .block-text {
            color: #1a3a5c;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
        }

        /* 第二个区块 - 输入和按钮 */
        .input-group {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .input-field {
            flex: 1;
            height: 48px;
            background-color: #e0e0e0;
            border: none;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 14px;
            color: #9e9e9e;
            outline: none;
        }

        .input-field::placeholder {
            color: #9e9e9e;
        }

        .query-btn {
            width: 80px;
            height: 48px;
            background-color: #1a3a5c;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .query-btn:hover {
            background-color: #2a4a6c;
        }

        .main-btn {
            width: 100%;
            height: 48px;
            background-color: #64d8d8;
            border: none;
            border-radius: 8px;
            color: #1a3a5c;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .main-btn:hover {
            background-color: #54c8c8;
        }

        /* 第三个区块 */
        .nav-btn {
            width: 100%;
            height: 48px;
            background-color: #1a3a5c;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .nav-btn:hover {
            background-color: #2a4a6c;
        }

        .download-btn {
            width: 100%;
            height: 48px;
            background-color: #64d8d8;
            border: none;
            border-radius: 8px;
            color: #1a3a5c;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #54c8c8;
        }

        /* 响应式调整 */
        @media (max-width: 400px) {
            .title {
                font-size: 28px;
            }

            .input-field {
                font-size: 12px;
            }

            .query-btn {
                width: 70px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">World of squares</h1>

        <!-- 第一个区块 -->
        <div class="block">
            <div class="block-content">
                <div class="shield-icon">
                    <div class="shield-inner">
                        <div class="shield-check"></div>
                    </div>
                </div>
                <p class="block-text">最强防封</p>
            </div>
        </div>

        <!-- 第二个区块 -->
        <div class="block">
            <div class="block-content">
                <div class="input-group">
                    <input type="text" class="input-field" placeholder="请输入卡密…">
                    <button class="query-btn">查询</button>
                </div>
                <a href="http://698fk.cn/MZdej" target="_blank" class="main-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">立即购买</a>
            </div>
        </div>

        <!-- 第三个区块 -->
        <div class="block">
            <div class="block-content">
                <button class="nav-btn">前往123云盘</button>
                <a href="https://www.123865.com/s/s4Tsvd-qWBY?pwd=pWCt#" target="_blank" class="download-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">下载World of squares</a>
            </div>
        </div>
    </div>
</body>
</html>
